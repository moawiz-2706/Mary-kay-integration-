services:
  - type: web
    name: mk-session-service
    env: node
    plan: starter          # Free tier works; upgrade to Starter ($7/mo) for always-on
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: npm start
    envVars:
      - key: API_SECRET_KEY
        sync: false        # Set manually in Render Dashboard (never commit to git)
      - key: MK_ACCOUNT_1_NUM
        sync: false
      - key: MK_ACCOUNT_1_PASS
        sync: false
      # Add more accounts as needed:
      # - key: MK_ACCOUNT_2_NUM
      #   sync: false
      # - key: MK_ACCOUNT_2_PASS
      #   sync: false
