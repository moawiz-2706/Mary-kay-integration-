services:
  - type: web
    name: mk-session-service
    env: node
    plan: starter
    # Puppeteer automatically downloads Chromium during npm/yarn install.
    # No separate browser install step is needed — this is the key fix.
    buildCommand: yarn install
    startCommand: npm start
    envVars:
      - key: API_SECRET_KEY
        sync: false
      - key: MK_ACCOUNT_1_NUM
        sync: false
      - key: MK_ACCOUNT_1_PASS
        sync: false
      # Puppeteer needs this on Render to skip the Chrome download check
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "false"
      # Add more accounts as needed:
      # - key: MK_ACCOUNT_2_NUM
      #   sync: false
      # - key: MK_ACCOUNT_2_PASS
      #   sync: false
